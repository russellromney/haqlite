[package]
name = "haqlite"
version = "0.1.0"
edition = "2021"
description = "HA building blocks for SQLite: leases, roles, join/leave, auto-promotion, self-fencing"
authors = ["Russell Romney <russellromney@gmail.com>"]
license = "Apache-2.0"

[dependencies]
# WAL sync primitives
walrust-core = { path = "../personal-website/walrust/crates/walrust-core" }

# Async runtime
tokio = { version = "1", features = ["full"] }
async-trait = "0.1"

# S3 (for S3LeaseStore)
aws-sdk-s3 = "1"
aws-config = { version = "1", features = ["behavior-version-latest"] }
aws-smithy-types = "1"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Utilities
anyhow = "1"
tracing = "0.1"
rand = "0.8"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4"] }

# HTTP (for HA experiment binaries)
axum = "0.8"
reqwest = { version = "0.12", features = ["json"] }

# CLI + logging (for experiment binaries)
clap = { version = "4", features = ["derive", "env"] }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# SQLite (for experiment binaries + on_promoted)
rusqlite = { version = "0.35", features = ["bundled"] }

[[bin]]
name = "haqlite-ha-experiment"
path = "src/bin/ha_experiment.rs"

[[bin]]
name = "haqlite-ha-writer"
path = "src/bin/ha_writer.rs"

[dev-dependencies]
tokio = { version = "1", features = ["full", "test-util"] }
tempfile = "3"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
rusqlite = { version = "0.35", features = ["bundled"] }
async-trait = "0.1"
futures = "0.3"
chrono = "0.4"
serde_json = "1"
