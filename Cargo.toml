[package]
name = "haqlite"
version = "0.1.0"
edition = "2021"
description = "HA SQLite with one line of code. Leader election, WAL replication, write forwarding — just your app + an S3 bucket."
authors = ["Russell Romney <russellromney@gmail.com>"]
license = "Apache-2.0"
repository = "https://github.com/russellromney/haqlite"
keywords = ["sqlite", "ha", "replication", "leader-election", "s3"]
categories = ["database", "network-programming"]

[dependencies]
# HA coordination framework
hadb = { path = "../hadb/hadb" }
hadb-lease-s3 = { path = "../hadb/hadb-lease-s3" }

# WAL sync primitives
walrust = "0.1.0"

# Async runtime
tokio = { version = "1", features = ["full"] }
async-trait = "0.1"

# S3 (for S3LeaseStore)
aws-sdk-s3 = "1"
aws-config = { version = "1", features = ["behavior-version-latest"] }
aws-smithy-types = "1"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Utilities
anyhow = "1"
tracing = "0.1"
rand = "0.8"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4"] }
hostname = "0.4"

# HTTP (write forwarding + experiment binaries)
axum = "0.8"
reqwest = { version = "0.12", features = ["json"] }

# CLI + logging (for experiment binaries)
clap = { version = "4", features = ["derive", "env"] }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# SQLite
rusqlite = { version = "0.35", features = ["bundled"] }

[[bin]]
name = "haqlite-ha-experiment"
path = "src/bin/ha_experiment.rs"

[[bin]]
name = "haqlite-ha-writer"
path = "src/bin/ha_writer.rs"

[dev-dependencies]
tokio = { version = "1", features = ["full", "test-util"] }
tempfile = "3"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
rusqlite = { version = "0.35", features = ["bundled"] }
async-trait = "0.1"
futures = "0.3"
chrono = "0.4"
serde_json = "1"
